version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sanju_career_os_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password_prod}
      POSTGRES_DB: ${DB_NAME:-sanjucareeros}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sanju_career_os_prod_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_password_prod}@db:5432/${DB_NAME:-sanjucareeros}?schema=public
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata_prod:
