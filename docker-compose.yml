version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: sanju-career-os-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sanju_career_os
    ports:
      - "5432:5432"
    volumes:
      - sanju_career_os_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sanju_career_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  sanju_career_os_pgdata:
