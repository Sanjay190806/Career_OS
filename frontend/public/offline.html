<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#060611" />
    <title>Sanju Career OS - Offline</title>
    <style>
      body { margin: 0; font-family: Inter, system-ui, sans-serif; background: #060611; color: #e5e7eb; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 640px; width: 100%; border: 1px solid rgba(59,130,246,.25); background: rgba(9,12,24,.92); border-radius: 28px; padding: 28px; }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { color: #a1a1aa; line-height: 1.7; }
      .chip { display: inline-flex; padding: 8px 12px; border-radius: 999px; border: 1px solid rgba(59,130,246,.25); margin-bottom: 16px; color: #60a5fa; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="chip">Offline ready</div>
        <h1>Sanju Career OS is offline.</h1>
        <p>The app shell is cached. Your local tracker state should still be available once the page finishes loading again, and sync will wait until you are back online.</p>
      </div>
    </div>
  </body>
</html>
